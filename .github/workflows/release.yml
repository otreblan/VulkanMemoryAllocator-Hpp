name: Release
on:
  workflow_dispatch:
jobs:
  build:
    uses: ./.github/workflows/build.yml
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      build
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0
        with:
          submodules: true
      - name: Package
        id: package
        run: |
          (cd include && cmake -B ../build)
          VERSION=`cat build/CMakeCache.txt | grep VMA_HPP_PROJECT_VERSION | cut -d= -f2`
          echo "version=$VERSION" | tee -a $GITHUB_OUTPUT

          git fetch --unshallow --tags --recurse-submodules=no
          BUILD=`git ls-remote --tags --sort='-v:refname' origin "refs/tags/v$VERSION*" | head -n 1 | cut -d+ -f2`
          BUILD=$((BUILD+1))
          echo "build=$BUILD" | tee -a $GITHUB_OUTPUT

          cp VulkanMemoryAllocator/include/vk_mem_alloc.h include
          mv include VulkanMemoryAllocator-Hpp
          tar czf VulkanMemoryAllocator-Hpp-$VERSION.tar.gz VulkanMemoryAllocator-Hpp
      - name: Release
        uses: actions/github-script@v8.0.0
        with:
          script: |
            const tar = 'VulkanMemoryAllocator-Hpp-${{ steps.package.outputs.version }}.tar.gz'
            const response = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'v${{ steps.package.outputs.version }}',
                tag_name: 'v${{ steps.package.outputs.version }}+${{ steps.package.outputs.build }}',
                target_commitish: '${{ github.ref_name }}',
                draft: true,
                prerelease: false,
                generate_release_notes: true,
            });
            var fs = require('fs');
            await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                url: response.data.upload_url,
                headers: { "content-type": "application/java-archive" },
                name: tar,
                data: fs.readFileSync(tar),
            });
